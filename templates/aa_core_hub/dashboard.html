{% extends "allianceauth/base.html" %}
{% block page_title %}Core Hub{% endblock %}
{% block content %}
<div class="container-fluid">
  <h3>Core Hub</h3>
  <div class="row">
    <div class="col-md-4">
      <div class="card card-body">
        <div class="h5">Structures</div>
        <div class="display-6">{{ structure_count }}</div>
        <a href="{% url 'aa_core_hub:structures' %}">View</a>
      </div>
    </div>
    <div class="col-md-4">
      <div class="card card-body">
        <div class="h5">Timers</div>
        <div class="display-6">{{ timer_count }}</div>
      </div>
    </div>
    <div class="col-md-4">
      <div class="card card-body">
        <div class="h5">D-Scans</div>
        <div class="display-6">{{ dscan_count }}</div>
        <a href="{% url 'aa_core_hub:dscan' %}">View</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
